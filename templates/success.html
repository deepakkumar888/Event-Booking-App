<!DOCTYPE html>
<html>
<head>
    <title>Booking Successful</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f4f4f4;
            text-align:center;
            padding-top:100px;
        }

        .box{
            background:white;
            width:500px;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        a{
            text-decoration:none;
        }

        button{
            padding:10px 20px;
            background:#ff4b2b;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="box">

<h1>Booking Successful 🎉</h1>

<p>
<b>{{ username }}</b>,
your booking for
<b>{{ event }}</b>
has been confirmed.
</p>

<a href="/">
<button>Back to Login</button>
</a>

</div>

</body>
</html>
