<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>

        body {
            font-family: Arial;
            background-image: url('/static/images/login-bg.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: rgba(255,255,255,0.9);
            padding: 35px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0px 0px 15px black;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border-radius: 5px;
            border: 1px solid gray;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 18px;
            background-color: #ff4b2b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #ff1e00;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h2>Event Booking Login</h2>

        <form action="/home" method="POST">

            <input type="text"
                   name="username"
                   placeholder="Enter Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Enter Password"
                   required>

            <button type="submit">Login</button>

        </form>

    </div>

</body>
</html>
