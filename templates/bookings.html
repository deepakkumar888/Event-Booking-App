<!DOCTYPE html>
<html>
<head>

<title>My Bookings</title>

<style>

body{
    font-family:Arial;
    padding:30px;
}

table{
    width:80%;
    margin:auto;
    border-collapse:collapse;
}

th,td{
    border:1px solid black;
    padding:10px;
    text-align:center;
}

th{
    background:#ff4b2b;
    color:white;
}

</style>

</head>

<body>

<h1 style="text-align:center;">
Booked Events
</h1>

<table>

<tr>
<th>User</th>
<th>Event</th>
</tr>

{% for booking in bookings %}

<tr>
<td>{{ booking.username }}</td>
<td>{{ booking.event }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
