<!DOCTYPE html>
<html>

<head>
    <title>Event Booking Platform</title>

    <style>

        body {
            font-family: Arial;
            margin: 0;
            padding: 20px;

            background-image:
            linear-gradient(rgba(0,0,0,0.6),
            rgba(0,0,0,0.6)),
            url('/static/images/home-bg.jpg');

            background-size: cover;
            background-attachment: fixed;
            color: white;
        }

        h1 {
            text-align: center;
        }

        h2 {
            text-align: center;
        }

        .event-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-top: 30px;
        }

        .event-card {
            background: rgba(255,255,255,0.95);
            width: 320px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0px 0px 15px black;
            color: black;
            transition: transform 0.3s;
        }

        .event-card:hover {
            transform: scale(1.03);
        }

        .event-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .content {
            padding: 15px;
        }

        .content h3 {
            margin-top: 0;
        }

        button {
            padding: 10px 18px;
            background-color: #ff4b2b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #ff1e00;
        }

    </style>

</head>

<body>

    <h1>Welcome {{ username }}</h1>

    <h2>Event Booking Platform</h2>

    <div class="event-container">

        {% for event in events %}

        <div class="event-card">

            <img src="{{ url_for('static', filename='images/' + event.image) }}">

            <div class="content">

                <h3>{{ event.name }}</h3>

                <p><strong>Date:</strong> {{ event.date }}</p>

                <p><strong>Location:</strong> {{ event.location }}</p>

                <p>{{ event.description }}</p>

                <button>Book Now</button>

            </div>

        </div>

        {% endfor %}

    </div>

</body>
</html>
